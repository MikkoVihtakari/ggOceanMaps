# R-CMD-check workflow for ggOceanMaps
# Based on r-lib/actions examples, pinned to the stable v2 branch.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

name: R-CMD-check

permissions:
  contents: read

concurrency:
  group: r-cmd-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2-branch

      - uses: r-lib/actions/setup-r@v2-branch
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
          extra-repositories: https://mikkovihtakari.github.io/drat

      - uses: r-lib/actions/setup-r-dependencies@v2-branch
        with:
          extra-packages: any::rcmdcheck

      - uses: r-lib/actions/check-r-package@v2-branch
